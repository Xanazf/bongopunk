# Bongopunk Antibaryon (Dark Mode) - Hyprland Configuration
# Based on Fluoromachine by maxmx03
# Synthwave dark theme with bright neon accents

env = GTK_THEME,Bongopunk:antibaryon

$dec_col_shadow_active = rgba(090318EE) # decoration.col.shadow
$dec_col_shadow_inactive = rgba(07021680) # decoration.col.shadow_inactive

$gen_col_border_active = rgba(61E2FFFF) # general.col.border_active
$gen_col_border_inactive = rgba(4A6B7C80) # general.col.border_inactive

$group_col_border_active = rgba(61E2FFFF) # group.col.border_active
$group_col_border_inactive = rgba(4A6B7C80) # group.col.border_inactive
$group_col_border_locked_active = rgba(FC199AFF) # group.col.border_locked_active
$group_col_border_locked_inactive = rgba(C9147B80) # group.col.border_locked_inactive

$group_bar_text_color = rgba(8BA7A7FF) # group.groupbar.text_color
$group_bar_col_active = rgba(61E2FFFF) # group.groupbar.col.active
$group_bar_col_inactive = rgba(4A6B7C80) # group.groupbar.col.inactive
$group_bar_col_locked_active = rgba(FC199AFF) # group.groupbar.col.locked_active
$group_bar_col_locked_inactive = rgba(C9147B80) # group.groupbar.col.locked_inactive

$misc_background_color = rgba(090318FF) # misc.background_color

decoration {
  # Blur (dark theme)
  blur {
    enabled = true
    size = 8
    passes = 3
    new_optimizations = true
    xray = false
    ignore_opacity = false
    noise = 0.0117
    contrast = 1.6816
    brightness = 0.8172
    vibrancy = 0.9126
    vibrancy_darkness = 0.1696
    input_methods = true
    input_methods_ignorealpha = 0.2
  }
}
