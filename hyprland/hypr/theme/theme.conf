# Bongopunk Baryon (Light Mode) - Hyprland Configuration
# Clean light theme with darker, muted accent colors

env = QT_QPA_PLATFORMTHEME,hyprqt6engine

source = ./variables.conf

source = ./animations.conf
source = ./layouts.conf
source = ./misc.conf
source = ./rules.conf

$custom1 = rgba(ff225bdf)
$custom2 = rgba(4e44ffd0)
$custom1_inactive = rgba(ff668d59)
$custom2_inactive = rgba(8e88ff9a)

general {
  gaps_in = 8
  gaps_out = 16
  border_size = 1
  no_border_on_floating = true

  col.active_border = $gen_col_border_active
  col.inactive_border = $gen_col_border_inactive
  col.active_border = $emptycolor $emptycolor $gen_col_border_active $emptycolor $emptycolor $gen_col_border_active $emptycolor $emptycolor 75deg
  col.inactive_border = $emptycolor $emptycolor $gen_col_border_inactive $emptycolor $emptycolor $gen_col_border_inactive $emptycolor $emptycolor 75deg
}

decoration {
  rounding = 8
  fullscreen_opacity = 1.0

  dim_modal = false
  dim_inactive = true
  dim_strength = 0.15
  dim_special = 0.3

  border_part_of_window = true

  shadow {
    enabled = true
    range = 3
    render_power = 3
    ignore_window = false
    color = $dec_col_shadow
    color_inactive = $dec_col_shadow_inactive
  }
}


# Theme-specific group styling
group {
  col.border_active = $group_col_border_active
  col.border_inactive = $group_col_border_inactive
  col.border_locked_active = $group_col_border_locked_active
  col.border_locked_inactive = $group_col_border_locked_inactive

  groupbar {
    enabled = true
    font_family = $monofont
    font_size = 10
    gradients = true
    height = 14
    priority = 3
    render_titles = true
    scrolling = true
    text_color = $group_bar_text_color
    col.active = $group_bar_col_active
    col.inactive = $group_bar_col_inactive
    col.locked_active = $group_bar_col_locked_active
    col.locked_inactive = $group_bar_col_locked_inactive 
  }
}

misc {
  background_color = $misc_background_color
}
