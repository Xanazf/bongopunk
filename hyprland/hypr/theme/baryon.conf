# Bongopunk Baryon (Light Mode) - Hyprland Configuration
# Clean light theme with darker, muted accent colors

env = GTK_THEME,Bongopunk:baryon
$dec_col_shadow_active = rgba(2D2D2D40) # decoration.col.shadow
$dec_col_shadow_inactive = rgba(6B728020) # decoration.col.shadow_inactive

$gen_col_border_active = rgba(0891B2FF) # general.col.border_active
$gen_col_border_inactive = rgba(D1D5DB80) # general.col.border_inactive

$group_col_border_active = rgba(0891B2FF) # group.col.border_active
$group_col_border_inactive = rgba(D1D5DB80) # group.col.border_inactive
$group_col_border_locked_active = rgba(BE185DFF) # group.col.border_locked_active
$group_col_border_locked_inactive = rgba(EC489980) # group.col.border_locked_inactive

$group_bar_text_color = rgba(2D2D2DFF) # group.groupbar.text_color
$group_bar_col_active = rgba(0891B2FF) # group.groupbar.col.active
$group_bar_col_inactive = rgba(D1D5DB80) # group.groupbar.col.inactive
$group_bar_col_locked_active = rgba(BE185DFF) # group.groupbar.col.locked_active
$group_bar_col_locked_inactive = rgba(EC489980) # group.groupbar.col.locked_inactive

$misc_background_color = rgba(FAFAFAFF) # misc.background_color

decoration {
  # Blur (light theme)
  blur {
    enabled = true
    size = 6
    passes = 2
    new_optimizations = true
    xray = false
    ignore_opacity = false
    noise = 0.0117
    contrast = 1.1
    brightness = 1.0
    vibrancy = 0.1
    vibrancy_darkness = 0.0
  }
}
