# Bongopunk Base - Animation Configuration
# Shared animation settings for all themes

animations {
  enabled = true
  first_launch_animation = true
  workspace_wraparound = true

  # Bezier curves for smooth, natural motion
  bezier = myBezier, 0.05, 0.9, 0.1, 1.05
  bezier = linear, 0.0, 0.0, 1.0, 1.0
  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.1, 0.1, 1.1
  bezier = winOut, 0.3, -0.3, 0, 1
  bezier = slow, 0, 0.85, 0.3, 1
  bezier = expOutOvershot, -0.15, 1.15, -0.05, 1.05
  bezier = expOut, 0.05, 0.95, 0.035, 1.05
  bezier = overshot, 0.13, 0.99, 0.29, 1.1

  # Animation definitions
  animation = windows, 1, 6, wind, slide
  animation = windowsIn, 1, 6, winIn, slide
  animation = windowsOut, 1, 5, winOut, slide
  animation = windowsMove, 1, 5, wind, slide
  animation = border, 1, 1, linear
  animation = borderangle, 1, 30, linear, loop
  animation = fade, 1, 10, default
  animation = workspaces, 1, 5, wind
  animation = specialWorkspace, 1, 5, wind, slidevert
}
