# Bongopunk Base - Rules Configuration
# Shared window rules, layer rules, and workspace rules

# Floating windows
windowrulev2 = float,class:^(pavucontrol)$
windowrulev2 = float,class:^(blueman-manager)$
windowrulev2 = float,class:^(nm-connection-editor)$
windowrulev2 = float,class:^(file-roller)$
windowrulev2 = float,title:^(Picture-in-Picture)$

# Window opacity rules
windowrulev2 = opacity 0.98 0.90,class:^(kitty)$
windowrulev2 = opacity 0.98 0.90,class:^(alacritty)$
windowrulev2 = opacity 0.95 0.85,class:^(thunar)$
windowrulev2 = opacity 0.95 0.85,class:^(nautilus)$
windowrulev2 = opacity 0.98 0.90,class:^(code)$
windowrulev2 = opacity 0.98 0.90,class:^(Code)$
windowrulev2 = opacity 1.0 1.0,class:^(firefox)$
windowrulev2 = opacity 1.0 1.0,class:^(chromium)$
windowrulev2 = opacity 0.95 0.85,class:^(discord)$
windowrulev2 = opacity 0.95 0.85,class:^(spotify)$

# Layer rules
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = blur, notifications
layerrule = ignorezero, notifications
