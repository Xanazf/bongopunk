# Bongopunk Base - Layout Configuration
# Shared layout settings for all themes

# Dwindle layout
dwindle {
  pseudotile = true
  preserve_split = true
  smart_split = false
  smart_resizing = true
  permanent_direction_override = false
  special_scale_factor = 0.8
  split_width_multiplier = 1.0
  no_gaps_when_only = 0
  use_active_for_splits = true
  default_split_ratio = 1.0
}

# Master layout
master {
  new_is_master = true
  new_on_top = false
  no_gaps_when_only = 0
  orientation = left
  inherit_fullscreen = true
  always_center_master = false
  smart_resizing = true
  drop_at_cursor = true
  mfact = 0.55
  special_scale_factor = 0.8
}

# General layout settings
general {
  gaps_workspaces = 0

  # Layout
  layout = dwindle

  # Cursor
  no_cursor_warps = false
  no_focus_fallback = false
  apply_sens_to_raw = false

  # Resize
  resize_on_border = true
  extend_border_grab_area = 15
  hover_icon_on_border = true
}
