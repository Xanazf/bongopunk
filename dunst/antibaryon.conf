# Bongopunk Antibaryon (Dark Mode) for Dunst
# Based on Fluoromachine by maxmx03

[global]
    # Display
    monitor = 0
    follow = mouse
    
    # Geometry
    width = 350
    height = 300
    origin = top-right
    offset = 10x50
    scale = 0
    notification_limit = 0
    
    # Progress bar
    progress_bar = true
    progress_bar_height = 10
    progress_bar_frame_width = 1
    progress_bar_min_width = 150
    progress_bar_max_width = 300
    
    # Appearance
    transparency = 10
    separator_height = 2
    padding = 8
    horizontal_padding = 8
    text_icon_padding = 0
    frame_width = 2
    frame_color = "#4A6B7C"
    separator_color = frame
    sort = yes
    
    # Text
    font = Hack Nerd Font 11
    line_height = 0
    markup = full
    format = "<b>%s</b>\n%b"
    alignment = left
    vertical_alignment = center
    show_age_threshold = 60
    ellipsize = middle
    ignore_newline = no
    stack_duplicates = true
    hide_duplicate_count = false
    show_indicators = yes
    
    # Icons
    icon_position = left
    min_icon_size = 32
    max_icon_size = 128
    
    # History
    sticky_history = yes
    history_length = 20
    
    # Misc/Advanced
    dmenu = /usr/bin/dmenu -p dunst:
    browser = /usr/bin/xdg-open
    always_run_script = true
    title = Dunst
    class = Dunst
    corner_radius = 8
    ignore_dbusclose = false
    
    # Mouse
    mouse_left_click = close_current
    mouse_middle_click = do_action, close_current
    mouse_right_click = close_all

[experimental]
    per_monitor_dpi = false

[urgency_low]
    background = "#090318"
    foreground = "#8BA7A7"
    frame_color = "#4A6B7C"
    timeout = 10

[urgency_normal]
    background = "#090318"
    foreground = "#8BA7A7"
    frame_color = "#61E2FF"
    timeout = 10

[urgency_critical]
    background = "#090318"
    foreground = "#FE4450"
    frame_color = "#FE4450"
    timeout = 0

# Application specific rules
[spotify]
    appname = "Spotify"
    background = "#090318"
    foreground = "#72F1B8"
    frame_color = "#72F1B8"

[discord]
    appname = "Discord"
    background = "#090318"
    foreground = "#AF6DF9"
    frame_color = "#AF6DF9"

[firefox]
    appname = "Firefox"
    background = "#090318"
    foreground = "#FF8B39"
    frame_color = "#FF8B39"