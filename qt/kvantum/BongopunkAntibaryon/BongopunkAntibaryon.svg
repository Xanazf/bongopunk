<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" version="1.1" xmlns="http://www.w3.org/2000/svg">
 <defs>
  <!-- Enhanced glow filters -->
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
   <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
   <feMerge> 
    <feMergeNode in="coloredBlur"/>
    <feMergeNode in="SourceGraphic"/>
   </feMerge>
  </filter>
  
  <filter id="text-glow" x="-50%" y="-50%" width="200%" height="200%">
   <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
   <feMerge> 
    <feMergeNode in="coloredBlur"/>
    <feMergeNode in="SourceGraphic"/>
   </feMerge>
  </filter>
  
  <filter id="strong-glow" x="-100%" y="-100%" width="300%" height="300%">
   <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
   <feMerge> 
    <feMergeNode in="coloredBlur"/>
    <feMergeNode in="SourceGraphic"/>
   </feMerge>
  </filter>
  

 </defs>
 
 <!-- Button Normal -->
 <rect id="button" x="0" y="0" width="32" height="32" rx="2" fill="#2D4A5C" stroke="none"/>
 
 <!-- Button Pressed -->
 <rect id="button-pressed" x="0" y="32" width="32" height="32" rx="2" fill="#1A2332" stroke="none"/>
 
 <!-- Button Hover with glow -->
 <rect id="button-hover" x="0" y="64" width="32" height="32" rx="2" fill="#2D4A5C" stroke="#61E2FF" stroke-width="1" filter="url(#glow)"/>
 
 <!-- Scrollbar -->
 <rect id="scrollbar-slider" x="32" y="0" width="16" height="32" rx="2" fill="#4A6B7C"/>
 <rect id="scrollbar-slider-hover" x="32" y="32" width="16" height="32" rx="2" fill="#61E2FF" filter="url(#glow)"/>
 <rect id="scrollbar-groove" x="48" y="0" width="16" height="32" fill="#1E2A3A"/>
 
 <!-- Progress bar -->
 <rect id="progressbar-chunk" x="64" y="0" width="32" height="8" fill="#61E2FF"/>
 <rect id="progressbar-groove" x="64" y="8" width="32" height="8" fill="#1A2332"/>
 
 <!-- Tab -->
 <rect id="tab-selected" x="96" y="0" width="32" height="32" fill="#2D4A5C" stroke="#61E2FF" stroke-width="1"/>
 <rect id="tab-normal" x="96" y="32" width="32" height="32" fill="#1E2A3A" stroke="none"/>
 
 <!-- Menu -->
 <rect id="menu" x="128" y="0" width="32" height="32" fill="#1E2A3A" stroke="none" opacity="0.95"/>
 <rect id="menuitem-selected" x="128" y="32" width="32" height="16" fill="#2D4A5C" stroke="#61E2FF" stroke-width="1" filter="url(#glow)"/>
 
 <!-- Input elements -->
 <rect id="lineedit" x="160" y="0" width="32" height="16" fill="#1A2332" stroke="none"/>
 <rect id="lineedit-focus" x="160" y="16" width="32" height="16" fill="#1A2332" stroke="#61E2FF" stroke-width="1" filter="url(#glow)"/>
 
 <!-- Combo box -->
 <rect id="combo" x="192" y="0" width="32" height="16" fill="#2D4A5C" stroke="none"/>
 <rect id="combo-hover" x="192" y="16" width="32" height="16" fill="#2D4A5C" stroke="#61E2FF" stroke-width="1" filter="url(#glow)"/>
</svg>
