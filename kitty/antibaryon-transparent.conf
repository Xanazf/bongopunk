# Bongopunk Antibaryon (Dark Mode) Transparent for Kitty
# Based on Fluoromachine by maxmx03

# Basic colors
foreground              #8BA7A7
background              none  # Transparent background
selection_foreground    #8BA7A7
selection_background    #2D4A5C

# Cursor colors
cursor                  #8BA7A7
cursor_text_color       background  # Use background for transparency

# URL underline color when hovering with mouse
url_color               #61E2FF

# Kitty window border colors
active_border_color     #AF6DF9
inactive_border_color   #4A6B7C
bell_border_color       #FFCC00

# OS Window titlebar colors
wayland_titlebar_color  system
macos_titlebar_color    system

# Tab bar colors
active_tab_foreground   #090318
active_tab_background   #AF6DF9
inactive_tab_foreground #8BA7A7
inactive_tab_background #070216
tab_bar_background      #070216

# Colors for marks (marked text in the terminal)
mark1_foreground #090318
mark1_background #FC199A
mark2_foreground #090318
mark2_background #AF6DF9
mark3_foreground #090318
mark3_background #61E2FF

# Transparency settings
background_opacity 1.0  # Let compositor handle transparency
dynamic_background_opacity yes

# The 16 terminal colors

# black
color0 #090318
color8 #495495

# red
color1 #FE4450
color9 #FF6B7A

# green
color2  #72F1B8
color10 #8FFAC8

# yellow
color3  #FFCC00
color11 #FFD633

# blue
color4  #61E2FF
color12 #7AEBFF

# magenta
color5  #FC199A
color13 #FF4DB8

# cyan
color6  #61E2FF
color14 #7AEBFF

# white
color7  #8BA7A7
color15 #B8C5C5