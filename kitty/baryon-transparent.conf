# Bongopunk Baryon (Light Mode) Transparent for Kitty
# Based on Fluoromachine by maxmx03

# Basic colors
foreground              #2D2D2D
background              none  # Transparent background
selection_foreground    #2D2D2D
selection_background    #E5E7EB

# Cursor colors
cursor                  #2D2D2D
cursor_text_color       background  # Use background for transparency

# URL underline color when hovering with mouse
url_color               #0891B2

# Kitty window border colors
active_border_color     #7C3AED
inactive_border_color   #D1D5DB
bell_border_color       #D97706

# OS Window titlebar colors
wayland_titlebar_color  system
macos_titlebar_color    system

# Tab bar colors
active_tab_foreground   #2D2D2D
active_tab_background   #FAFAFA
inactive_tab_foreground #6B7280
inactive_tab_background #F5F5F5
tab_bar_background      #F5F5F5

# Colors for marks (marked text in the terminal)
mark1_foreground #FAFAFA
mark1_background #BE185D
mark2_foreground #FAFAFA
mark2_background #7C3AED
mark3_foreground #FAFAFA
mark3_background #0891B2

# Transparency settings
background_opacity 1.0  # Let compositor handle transparency
dynamic_background_opacity yes

# The 16 terminal colors

# black
color0 #1F2937
color8 #4B5563

# red
color1 #DC2626
color9 #EF4444

# green
color2  #059669
color10 #10B981

# yellow
color3  #D97706
color11 #F59E0B

# blue
color4  #0891B2
color12 #06B6D4

# magenta
color5  #BE185D
color13 #EC4899

# cyan
color6  #0891B2
color14 #06B6D4

# white
color7  #6B7280
color15 #2D2D2D